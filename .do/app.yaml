name: lifestyle-dashboard

services:
  - name: api
    dockerfile_path: Dockerfile.api
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: front
    dockerfile_path: Dockerfile.front
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: "http://api:3000"
    routes:
      - path: /
