@let totalCount = $totalCount();
@let plannedCount = $plannedCount();
@let additionalRange = $additionalRange();

<div [class]="`container ${$size()}`">
  <span class="count"> {{ totalCount }} / {{ plannedCount }} </span>
  <div class="dots">
    @for (additional of additionalRange; track $index) {
      <lifeel-icon class="icon" name="dot" [color]="$color()" />
    }
  </div>
</div>
