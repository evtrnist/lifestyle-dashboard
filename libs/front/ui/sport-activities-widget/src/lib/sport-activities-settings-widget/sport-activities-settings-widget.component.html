<button
  variant="secondary"
  size="m"
  lifeelButton
  type="button"
  (click)="addActivity()"
  iconStart="circle-plus"
>
  Add activity
</button>

@for (group of form.controls; track $index) {
  <div class="activity">
    <div class="activity-container">
      <div class="fields-container">
        <tui-textfield class="field">
          <input [formControl]="group.controls.emoji" placeholder="Emoji" tuiTextfield />
        </tui-textfield>

        <tui-textfield class="field">
          <input
            tuiInputTime
            [mode]="mode"
            [formControl]="group.controls.duration"
            placeholder="Duration"
          />
        </tui-textfield>
      </div>

      <tui-textfield class="field">
        <input [formControl]="group.controls.comment" placeholder="Comment" tuiTextfield />
      </tui-textfield>
    </div>
    <button
      variant="dotted-secondary"
      iconStart="trash"
      size="xs"
      lifeelButton
      type="button"
      (click)="removeActivity($index)"
    >
      Delete
    </button>
  </div>
}
