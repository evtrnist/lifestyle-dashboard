@if (loading()) {
  <span class="lifeel-button__loader" aria-hidden="true"></span>
}

<span class="lifeel-button__content">
  @let currentIconStart = iconStart();
  @let currentIconEnd = iconEnd();
  @if (currentIconStart) {
    <lifeel-icon
      class="lifeel-button__icon lifeel-button__icon--start"
      [name]="currentIconStart"
    ></lifeel-icon>
  }
  <ng-content></ng-content>
  @if (currentIconEnd) {
    <lifeel-icon
      class="lifeel-button__icon lifeel-button__icon--end"
      [name]="currentIconEnd"
    ></lifeel-icon>
  }
</span>
